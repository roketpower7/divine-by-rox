<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Devine By Rox | Luxury Nails</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Paleta Beige y Oro Estilo Versace */
            --beige-elegante: #DBC1AC;
            --dorado-versace: #B69121;
            --crema-lujo: #F9F6F1;
            --negro-detalles: #1A1A1A;
            --texto: #4A443F;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--crema-lujo);
            color: var(--texto);
            margin: 0;
            /* Fondo con patrón de greca sutil estilo Versace */
            background-image: url('https://www.transparenttextures.com/patterns/cubes.png'); 
        }

        /* 1. PORTADA ESTILO LUXURY */
        .hero {
            height: 100vh;
            background: linear-gradient(rgba(249, 246, 241, 0.8), rgba(249, 246, 241, 0.8)), 
                        url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=1920&q=80') center/cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border-bottom: 8px solid var(--dorado-versace);
            /* Borde estilo greca superior e inferior */
            border-top: 8px solid var(--dorado-versace);
        }

        .hero h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 6rem;
            color: var(--dorado-versace);
            margin: 0;
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.1));
        }

        .hero p {
            font-size: 1.2rem;
            font-weight: 400;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: var(--negro-detalles);
            margin-top: 10px;
            margin-bottom: 50px;
        }

        /* Botones Versace */
        .botones-hero { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }

        .btn {
            padding: 18px 40px;
            border-radius: 0; /* Estilo más cuadrado y arquitectónico */
            text-decoration: none;
            font-weight: 600;
            transition: all 0.4s ease;
            border: 2px solid var(--dorado-versace);
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 2px;
        }

        .btn-dorado {
            background-color: var(--dorado-versace);
            color: white;
        }

        .btn-dorado:hover {
            background-color: var(--negro-detalles);
            border-color: var(--negro-detalles);
        }

        .btn-transparente {
            background-color: transparent;
            color: var(--negro-detalles);
        }

        .btn-transparente:hover {
            background-color: var(--dorado-versace);
            color: white;
        }

        /* SECCIONES */
        .seccion {
            padding: 100px 20px;
            max-width: 1100px;
            margin: 0 auto;
            text-align: center;
        }

        .titulo-seccion {
            font-family: 'Great Vibes', cursive;
            font-size: 4.5rem;
            color: var(--dorado-versace);
            margin-bottom: 10px;
        }

        /* CARRUSEL MEJORADO */
        .carrusel {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            gap: 25px;
            padding: 40px 0;
            scrollbar-width: none;
        }

        .foto-carrusel {
            scroll-snap-align: center;
            flex: 0 0 300px;
            height: 400px;
            object-fit: cover;
            border: 4px solid var(--dorado-versace);
            box-shadow: 15px 15px 0px var(--beige-elegante);
        }

        /* CONTENEDOR DE CITAS */
        #citas {
            background-color: white;
            border: 1px solid var(--beige-elegante);
            margin-bottom: 50px;
        }

        .mapa-container {
            border: 5px solid var(--dorado-versace);
            box-shadow: 10px 10px 0px var(--beige-elegante);
        }

        @media (max-width: 768px) {
            .hero h1 { font-size: 4.5rem; }
            .hero p { letter-spacing: 3px; }
        }
    </style>
</head>
<body>

    <section class="hero">
        <h1>Devine By Rox</h1>
        <p>Estudio de Uñas de Lujo</p>
        <div class="botones-hero">
            <a href="#citas" class="btn btn-dorado">Agendar Ahora</a>
            <a href="#ubicacion" class="btn btn-transparente">Nuestra Ubicación</a>
        </div>
    </section>

    <section class="seccion" id="galeria">
        <h2 class="titulo-seccion">El Arte de Rox</h2>
        <p style="letter-spacing: 2px; color: var(--beige-elegante); font-weight: 600;">PORTAFOLIO EXCLUSIVO</p>
        
        <div class="carrusel">
            <img src="Dise%C3%B1o%20de%20u%C3%B1as%201.jpg" alt="Uñas 1" class="foto-carrusel">
            <img src="Dise%C3%B1o%20de%20u%C3%B1as%202.jpg" alt="Uñas 2" class="foto-carrusel">
            <img src="Dise%C3%B1o%20de%20u%C3%B1as%203.jpg" alt="Uñas 3" class="foto-carrusel">
            <img src="Dise%C3%B1o%20de%20u%C3%B1as%204.jpg" alt="Uñas 4" class="foto-carrusel">
        </div>
    </section>

    <section class="seccion" id="citas">
        <h2 class="titulo-seccion">Reserva tu Experiencia</h2>
        
        <div class="calendly-inline-widget" data-url="TU_LINK_AQUI" style="min-width:320px;height:700px;"></div>
        <script type="text/javascript" src="https://assets.calendly.com/assets/external/widget.js" async></script>
        
    </section>

    <section class="seccion" id="ubicacion">
        <h2 class="titulo-seccion">Encuéntranos</h2>
        <div class="mapa-container">
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3430.6558273617384!2d-96.4357776495394!3d30.65582736173841!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x86468383f982846d%3A0xc3f5c707559e19e5!2sBryan%2C%20TX!5e0!3m2!1sen!2sus!4v1713318000000!5m2!1sen!2sus" width="100%" height="450" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
        </div>
    </section>

</body>
</html>
