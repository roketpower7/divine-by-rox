<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Divine By Rox | Uñas y Pedicura</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        /* Paleta de Colores Oficial */
        :root {
            --guinda: #6A1E34;
            --dorado: #D4AF37;
            --dorado-claro: #ebd07f;
            --fondo: #FDFBF7; 
            --texto: #333333;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--fondo);
            color: var(--texto);
            margin: 0;
            padding: 0;
        }

        /* 1. PORTADA */
        .hero {
            height: 100vh;
            background: linear-gradient(rgba(106, 30, 52, 0.85), rgba(106, 30, 52, 0.85)), url('https://images.unsplash.com/photo-1522337660859-02fbefca4702?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') center/cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            padding: 0 20px;
        }

        .hero h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 5.5rem;
            color: var(--dorado);
            margin: 0;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.4);
        }

        .hero p {
            font-size: 1.1rem;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-top: 5px;
            margin-bottom: 40px;
        }

        .botones-hero {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 15px 35px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 2px solid var(--dorado);
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .btn-dorado {
            background-color: var(--dorado);
            color: var(--guinda);
        }

        .btn-dorado:hover {
            background-color: transparent;
            color: var(--dorado);
        }

        .btn-transparente {
            background-color: transparent;
            color: var(--dorado);
        }

        .btn-transparente:hover {
            background-color: var(--dorado);
            color: var(--guinda);
        }

        /* Estilos Generales */
        .seccion {
            padding: 80px 20px;
            max-width: 1000px;
            margin: 0 auto;
            text-align: center;
        }

        .titulo-seccion {
            font-family: 'Great Vibes', cursive;
            font-size: 4rem;
            color: var(--guinda);
            margin-bottom: 5px;
            margin-top: 0;
        }

        /* NUEVA SECCIÓN: SERVICIOS */
        .servicios-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .servicio-card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            border-bottom: 4px solid var(--dorado);
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
        }

        .servicio-card:hover {
            transform: translateY(-10px);
        }

        .servicio-card h3 {
            color: var(--guinda);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }

        /* 2. CARRUSEL */
        .carrusel {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            gap: 20px;
            padding: 20px 0;
            scrollbar-width: thin;
            scrollbar-color: var(--dorado) var(--fondo);
        }

        .carrusel::-webkit-scrollbar { height: 8px; }
        .carrusel::-webkit-scrollbar-thumb { background-color: var(--dorado); border-radius: 10px; }

        .foto-carrusel {
            scroll-snap-align: center;
            flex: 0 0 280px;
            height: 380px;
            object-fit: cover;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            border: 2px solid var(--dorado);
        }

        /* 3. CALENDLY Y MAPA */
        .mapa-container {
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            border: 2px solid var(--dorado);
            margin-top: 30px;
        }

        iframe {
            width: 100%;
            height: 400px;
            border: none;
            display: block;
        }

        @media (max-width: 768px) {
            .hero h1 { font-size: 3.5rem; }
            .titulo-seccion { font-size: 3rem; }
            .foto-carrusel { flex: 0 0 240px; height: 340px; }
        }
    </style>
</head>
<body>

    <section class="hero">
        <h1>Divine By Rox</h1>
        <p>Uñas, Pedicura & Estilo</p>
        <div class="botones-hero">
            <a href="#citas" class="btn btn-dorado">Agendar Cita</a>
            <a href="#servicios" class="btn btn-transparente">Servicios</a>
        </div>
    </section>
